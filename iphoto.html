<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone 17 Pro - Modern UI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 20px;
  }

  /* iPhone 17 Pro Frame with Premium Finish */
  .iphone17 {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 55px;
    border: 12px solid #1c1c1e;
    box-shadow: 
      0 0 0 2px #3a3a3c,
      0 50px 100px rgba(0,0,0,0.6),
      inset 0 0 60px rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
    transition: transform 0.4s ease;
  }

  .iphone17:hover {
    transform: translateY(-5px);
  }

  /* Dynamic Island */
  .dynamic-island {
    width: 120px;
    height: 35px;
    background: #000;
    border-radius: 20px;
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: width 0.3s ease;
  }

  .dynamic-island:hover {
    width: 200px;
  }

  .dynamic-island .camera {
    width: 12px;
    height: 12px;
    background: #1c1c1e;
    border-radius: 50%;
    border: 2px solid #3a3a3c;
  }

  /* Status Bar */
  .status-bar {
    position: absolute;
    top: 15px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 28px;
    color: white;
    font-size: 14px;
    font-weight: 500;
    z-index: 9;
    pointer-events: none;
  }

  .status-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-right i {
    font-size: 14px;
  }

  /* Screen Background with Animated Gradient */
  .screen {
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(ellipse at 20% 80%, rgba(106, 84, 255, 0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(236, 72, 153, 0.3) 0%, transparent 50%),
      linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    padding-top: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Floating Particles Effect */
  .particles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    animation: float 20s infinite linear;
  }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
  }

  /* App Icons Grid */
  .icons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px 16px;
    padding: 20px;
    width: 100%;
    max-width: 340px;
    animation: slideUp 0.6s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .app-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .app-icon:hover {
    transform: scale(1.1);
  }

  .app-icon .icon-box {
    width: 58px;
    height: 58px;
    background: rgba(255,255,255,0.15);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
  }

  .app-icon:hover .icon-box {
    background: rgba(255,255,255,0.25);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }

  .app-icon .label {
    font-size: 11px;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* Page Indicator */
  .page-indicator {
    display: flex;
    gap: 6px;
    margin: 10px 0 30px;
  }

  .page-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.3s ease;
  }

  .page-dot.active {
    background: white;
    transform: scale(1.2);
  }

  /* Login Card - Premium Glassmorphism */
  .login-card {
    position: absolute;
    bottom: 90px;
    background: rgba(255,255,255,0.08);
    padding: 28px 24px;
    border-radius: 28px;
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 
      0 20px 50px rgba(0,0,0,0.4),
      inset 0 1px 1px rgba(255,255,255,0.1);
    width: 88%;
    max-width: 340px;
    text-align: center;
    color: white;
    animation: fadeInUp 0.8s ease-out 0.3s both;
  }

  @keyframes fadeInUp {
    from { 
      opacity: 0; 
      transform: translateY(40px) scale(0.95); 
    }
    to { 
      opacity: 1; 
      transform: translateY(0) scale(1); 
    }
  }

  .login-card h2 {
    margin-bottom: 24px;
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Input Fields */
  .input-group {
    position: relative;
    margin-bottom: 18px;
  }

  .input-group input {
    width: 100%;
    padding: 16px 45px 16px 18px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.1);
    color: white;
    transition: all 0.3s ease;
  }

  .input-group input::placeholder {
    color: rgba(255,255,255,0.5);
  }

  .input-group input:focus {
    background: rgba(255,255,255,0.15);
    border-color: rgba(167, 139, 250, 0.6);
    box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
  }

  .input-group i {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .input-group i:hover {
    color: white;
  }

  /* Login Button with Gradient */
  .login-btn {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    color: white;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .login-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s ease;
  }

  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
  }

  .login-btn:hover::before {
    left: 100%;
  }

  .login-btn:active {
    transform: translateY(0);
  }

  /* Forgot Password Link */
  .forgot {
    margin-top: 18px;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: color 0.2s;
  }

  .forgot:hover {
    color: #a78bfa;
    text-decoration: underline;
  }

  /* Dock at Bottom */
  .dock {
    position: absolute;
    bottom: 25px;
    width: 90%;
    max-width: 320px;
    background: rgba(255,255,255,0.1);
    border-radius: 25px;
    padding: 12px 20px;
    display: flex;
    justify-content: space-around;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .dock .app-icon .icon-box {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    font-size: 20px;
  }

  .dock .app-icon .label {
    display: none;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }

  /* Responsive */
  @media (max-width: 450px) {
    .iphone17 {
      transform: scale(0.95);
    }
  }

  @media (max-width: 400px) {
    .iphone17 {
      transform: scale(0.85);
    }
  }
</style>
</head>
<body>

<div class="iphone17">
  <!-- Dynamic Island -->
  <div class="dynamic-island">
    <div class="camera"></div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div id="clock">12:00</div>
    <div class="status-right">
      <i class="fas fa-signal"></i>
      <i class="fas fa-wifi"></i>
      <i class="fas fa-battery-three-quarters"></i>
    </div>
  </div>

  <div class="screen">
    <!-- Animated Particles -->
    <div class="particles" id="particles"></div>

    <!-- App Icons -->
    <div class="icons">
      <div class="app-icon"><div class="icon-box">📱</div><span class="label">Phone</span></div>
      <div class="app-icon"><div class="icon-box">💬</div><span class="label">Messages</span></div>
      <div class="app-icon"><div class="icon-box">🌐</div><span class="label">Safari</span></div>
      <div class="app-icon"><div class="icon-box">📷</div><span class="label">Camera</span></div>
      <div class="app-icon"><div class="icon-box">🎵</div><span class="label">Music</span></div>
      <div class="app-icon"><div class="icon-box">📸</div><span class="label">Photos</span></div>
      <div class="app-icon"><div class="icon-box">🗺️</div><span class="label">Maps</span></div>
      <div class="app-icon"><div class="icon-box">⚙️</div><span class="label">Settings</span></div>
    </div>

    <!-- Page Indicator -->
    <div class="page-indicator">
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <h2>សូមស្វាគមន៍ 👋</h2>
      <div class="input-group">
        <input type="email" placeholder="អ៊ីមែល" id="email">
        <i class="fas fa-envelope"></i>
      </div>
      <div class="input-group">
        <input type="password" placeholder="ពាក្យសម្ងាត់" id="password">
        <i class="fas fa-lock toggle-password" id="togglePassword"></i>
      </div>
      <button class="login-btn" id="loginBtn">ចូលគណនី</button>
      <div class="forgot">ភ្លេចពាក្យសម្ងាត់?</div>
    </div>

    <!-- Dock -->
    <div class="dock">
      <div class="app-icon"><div class="icon-box">📞</div></div>
      <div class="app-icon"><div class="icon-box">💬</div></div>
      <div class="app-icon"><div class="icon-box">🌐</div></div>
      <div class="app-icon"><div class="icon-box">🎵</div></div>
    </div>

    <!-- Home Indicator -->
    <div class="home-indicator"></div>
  </div>
</div>

<script>
  // Dynamic Clock with smooth update
  function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Create Floating Particles
  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 20 + 's';
      particle.style.animationDuration = (15 + Math.random() * 20) + 's';
      container.appendChild(particle);
    }
  }
  createParticles();

  // Password Toggle
  document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const icon = this;
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      icon.classList.remove('fa-lock');
      icon.classList.add('fa-eye');
    } else {
      passwordInput.type = 'password';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-lock');
    }
  });

  // Login Button Animation & Validation
  document.getElementById('loginBtn').addEventListener('click', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if (email && password) {
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> កំពុងចូល...';
      this.disabled = true;
      
      setTimeout(() => {
        alert('✅ ចូលគណនីជោគជ័យ!\nWelcome back! 🎉');
        this.innerHTML = 'ចូលគណនី';
        this.disabled = false;
      }, 1500);
    } else {
      this.style.animation = 'shake 0.5s';
      setTimeout(() => {
        this.style.animation = '';
        alert('⚠️ សូមបំពេញអ៊ីមែល និងពាក្យសម្ងាត់!');
      }, 500);
    }
  });

  // Add shake animation
  const style = document.createElement('style');
  style.textContent = `
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
  `;
  document.head.appendChild(style);

  // Icon hover sound effect (optional - visual feedback only)
  document.querySelectorAll('.app-icon').forEach(icon => {
    icon.addEventListener('mouseenter', function() {
      this.style.transform = 'scale(1.15)';
    });
    icon.addEventListener('mouseleave', function() {
      this.style.transform = 'scale(1)';
    });
  });
</script>

</body>
</html>
